<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心念簿 - 絮语树洞</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 顶部标题区 -->
  <div class="header-left">
    <h1>心念簿</h1>
    <p>每一个起心动念，都是你认真生活的证明</p>
    <div class="stats">
      <span>共 <span id="whisper-count">0</span> 条絮语</span>
      <button class="random-btn">随机遇见</button>
      <button class="all-btn">查看全部</button>
    </div>
  </div>

  <!-- 右上角状态 -->
  <div class="header-right">
    <span id="online-count">0 人此刻同在</span>
    <div class="scene-display" id="scene-display">夏·夜晚</div>
  </div>

  <!-- 右下角功能区 -->
  <div class="footer-right">
    <button class="my-whisper-btn">我的絮语</button>
    <button class="publish-btn">+ 心心絮语</button>
  </div>

  <!-- 发布弹窗（心情+颜色标注） -->
  <div class="input-modal" id="input-modal">
    <button class="close-btn" id="input-close-btn">×</button>
    <div class="input-header">
      <h2>此刻，你想说什么？</h2>
      <p>写下来就好，不需要理由，也不用完整</p>
    </div>
    <div class="mood-select">
      <label>此刻你的心念：</label>
      <select id="mood-select">
        <option value="joy" data-color="#FF5E7D">愉悦 <span style="background:#FF5E7D; width:12px; height:12px; display:inline-block; border-radius:2px;"></span></option>
        <option value="hope" data-color="#7B61FF">希望 <span style="background:#7B61FF; width:12px; height:12px; display:inline-block; border-radius:2px;"></span></option>
        <option value="love" data-color="#4CC9FF">被爱 <span style="background:#4CC9FF; width:12px; height:12px; display:inline-block; border-radius:2px;"></span></option>
        <option value="miss" data-color="#2ECC71">怀念 <span style="background:#2ECC71; width:12px; height:12px; display:inline-block; border-radius:2px;"></span></option>
        <option value="hesitate" data-color="#F1C40F">犹豫 <span style="background:#F1C40F; width:12px; height:12px; display:inline-block; border-radius:2px;"></span></option>
        <option value="plain" data-color="#E67E22">平淡 <span style="background:#E67E22; width:12px; height:12px; display:inline-block; border-radius:2px;"></span></option>
        <option value="lonely" data-color="#9B59B6">孤独 <span style="background:#9B59B6; width:12px; height:12px; display:inline-block; border-radius:2px;"></span></option>
      </select>
    </div>
    <textarea class="input-text" id="input-text" placeholder="今天，我……"></textarea>
    <button class="submit-btn" id="submit-btn">我准备好了</button>
  </div>

  <!-- 详情弹窗（顶部增加同色条） -->
  <div class="detail-modal" id="detail-modal">
    <!-- 顶部彩色条 -->
    <div class="detail-top-bar" id="detail-top-bar"></div>
    <button class="close-btn" id="detail-close-btn">×</button>
    <div class="detail-main">
      <p id="detail-content"></p>
      <div class="detail-meta">
        <span id="detail-reply-count">回响 · 0</span>
        <div class="detail-like">
          <span id="detail-like-count">0</span>
          <span class="heart-icon" id="detail-heart">❤️</span>
        </div>
      </div>
    </div>
    <div class="reply-list" id="reply-list"></div>
    <div class="reply-input-area">
      <textarea class="reply-input" id="reply-input" placeholder="写下你的心念（50字以内）…"></textarea>
      <button class="reply-submit-btn" id="reply-submit-btn">留下您的心念</button>
    </div>
  </div>

  <!-- 随机遇见弹窗（可评论） -->
  <div class="random-modal" id="random-modal">
    <button class="close-btn" id="random-close-btn">×</button>
    <div class="random-top-bar" id="random-top-bar"></div>
    <div class="random-content" id="random-content"></div>
    <div class="random-meta">
      <span id="random-reply-count">回响 · 0</span>
      <div class="random-like">
        <span id="random-like-count">0</span>
        <span class="heart-icon" id="random-heart">❤️</span>
      </div>
    </div>
    <div class="random-reply-list" id="random-reply-list"></div>
    <div class="reply-input-area">
      <textarea class="reply-input" id="random-reply-input" placeholder="写下你的心念（50字以内）…"></textarea>
      <button class="reply-submit-btn" id="random-reply-submit-btn">留下您的心念</button>
    </div>
  </div>

  <!-- 全部查看列表（颜色筛选） -->
  <div class="all-list-modal" id="all-list-modal">
    <button class="close-btn" id="all-close-btn">×</button>
    <div class="all-header">
      <span>全部心念</span>
      <div class="color-tags">
        <span class="all-tag active" data-color="all">全部</span>
        <span class="color-tag" style="background:#FF5E7D;" data-color="#FF5E7D" title="愉悦"></span>
        <span class="color-tag" style="background:#7B61FF;" data-color="#7B61FF" title="希望"></span>
        <span class="color-tag" style="background:#4CC9FF;" data-color="#4CC9FF" title="被爱"></span>
        <span class="color-tag" style="background:#2ECC71;" data-color="#2ECC71" title="怀念"></span>
        <span class="color-tag" style="background:#F1C40F;" data-color="#F1C40F" title="犹豫"></span>
        <span class="color-tag" style="background:#E67E22;" data-color="#E67E22" title="平淡"></span>
        <span class="color-tag" style="background:#9B59B6;" data-color="#9B59B6" title="孤独"></span>
      </div>
    </div>
    <div class="all-list-content" id="all-list-content"></div>
  </div>

  <!-- 我的絮语列表 -->
  <div class="my-list-modal" id="my-list-modal">
    <button class="close-btn" id="my-close-btn">×</button>
    <div class="my-header">
      <span>我的心念</span>
    </div>
    <div class="my-list-content" id="my-list-content"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
