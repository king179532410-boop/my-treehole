<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TiedStory - 絮语树洞</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 顶部左侧logo和标语 -->
  <div class="header-left">
    <h1>TiedStory</h1>
    <p>每一条絮语，都是你认真生活的证明</p>
    <div class="stats">
      <span>共 <span id="whisper-count">0</span> 条絮语</span>
      <button class="random-btn">随机遇见</button>
      <button class="all-btn">查看全部</button>
    </div>
  </div>

  <!-- 顶部右侧：到访数、在线数、场景（仅显示，不手动切换） -->
  <div class="header-right">
    <span id="visit-count">0 人到访过</span>
    <span id="online-count">0 人在线</span>
    <div class="scene-display" id="scene-display">夏·夜晚</div>
  </div>

  <!-- 右下角功能区（删凭码查看） -->
  <div class="footer-right">
    <button class="my-whisper-btn">我的絮语</button>
    <button class="publish-btn">+ 系上一条</button>
  </div>

  <!-- 输入弹窗（默认隐藏） -->
  <div class="input-modal" id="input-modal">
    <textarea class="input-text" id="input-text" placeholder="写下你的心里话吧～"></textarea>
    <button class="submit-btn" id="submit-btn">发布</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
